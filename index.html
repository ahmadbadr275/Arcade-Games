<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub 🎮</title>
<style>
/* --- General Body & Arcade Theme --- */
body {
    background: #111;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    text-align: center;
    margin: 0;
    padding: 0;
}

/* --- Headers --- */
h1, h2 {
    margin: 20px 0;
    color: #ff0055;
    text-shadow: 0 0 5px #ff0055, 0 0 10px #ff0055;
}

/* --- Buttons --- */
button {
    background: #222;
    border: 2px solid #ff0055;
    color: #fff;
    padding: 12px 25px;
    margin: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
    text-shadow: 0 0 2px #ff0055;
}
button:hover {
    background: #ff0055;
    color: #111;
    box-shadow: 0 0 10px #ff0055;
}

/* --- Menu & Game Layout --- */
.menu, .game { display: none; margin-top: 20px; }
.active { display: block; }

/* --- Input Fields --- */
input[type=number] {
    padding: 8px;
    font-size: 14px;
    width: 80px;
    text-align: center;
    border: 2px solid #ff0055;
    background: #111;
    color: #fff;
    text-shadow: 0 0 2px #ff0055;
}

/* --- Messages --- */
#message { margin-top: 15px; font-size: 14px; text-shadow: 0 0 2px #ff0055; }

/* --- Snake Canvas --- */
#snakeCanvas {
    background: #111;
    border: 2px solid #ff0055;
    display: block;
    margin: 20px auto;
}

/* --- Snake Control Buttons (Bigger Version) --- */
#snakeControls {
    margin-top: 15px;
    text-align: center;
}

#snakeControls button {
    width: 80px;      
    height: 80px;     
    font-size: 28px;  
    margin: 8px;
    background: #222;
    border: 3px solid #ff0055;
    color: #fff;
    cursor: pointer;
    text-shadow: 0 0 3px #ff0055;
    transition: 0.2s;
    border-radius: 8px;
}
#snakeControls button:hover {
    background: #ff0055;
    color: #111;
    box-shadow: 0 0 15px #ff0055;
}
</style>
</head>
<body>

<h1>🎮 ARCADE HUB</h1>

<!-- Menu -->
<div class="menu active" id="menu">
    <p>Select a game:</p>
    <button id="openGuess">🎯 Guess the Number</button>
    <button id="openClicker">🖱️ Clicker Game</button>
    <button id="openSnake">🐍 Snake Game</button>
</div>

<!-- Guess the Number -->
<div class="game" id="guess">
    <h2>🎯 GUESS THE NUMBER</h2>
    <input type="number" id="guessInput" placeholder="Enter number">
    <button id="guessBtn">GUESS</button>
    <p id="message"></p>
    <p id="lives">❤️ Lives: 10</p>
    <button id="restartGuess">RESTART</button>
    <button class="back">🏠 Menu</button>
</div>

<!-- Clicker Game -->
<div class="game" id="clicker">
    <h2>🖱️ CLICKER GAME</h2>
    <button id="clickButton">CLICK ME!</button>
    <p>Score: <span id="score">0</span></p>
    <button id="restartClicker">RESTART</button>
    <button class="back">🏠 Menu</button>
</div>

<!-- Snake Game -->
<div class="game" id="snake">
    <h2>🐍 SNAKE GAME</h2>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <p>Score: <span id="snakeScore">0</span></p>
    <button id="startSnake">START</button>
    <div id="snakeControls">
        <button id="upBtn">⬆️</button><br>
        <button id="leftBtn">⬅️</button>
        <button id="downBtn">⬇️</button>
        <button id="rightBtn">➡️</button>
    </div>
    <button class="back">🏠 Menu</button>
</div>

<script>
// --- Menu ---
const games = ["menu", "guess", "clicker", "snake"];
function openGame(id) {
    games.forEach(g => document.getElementById(g).classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

document.getElementById('openGuess').onclick = () => openGame('guess');
document.getElementById('openClicker').onclick = () => openGame('clicker');
document.getElementById('openSnake').onclick = () => openGame('snake');

document.querySelectorAll('.back').forEach(btn => {
    btn.onclick = () => {
        clearInterval(snakeInterval);
        openGame('menu');
    };
});

// --- Guess the Number ---
let randomNumber = Math.floor(Math.random() * 100) + 1;
let lives = 10;

const guessInput = document.getElementById("guessInput");
const guessBtn = document.getElementById("guessBtn");
const message = document.getElementById("message");
const livesDisplay = document.getElementById("lives");
const restartGuess = document.getElementById("restartGuess");

guessBtn.onclick = () => {
    const guess = Number(guessInput.value);
    if (!guess) { message.textContent = "❌ Enter a number!"; return; }
    if (guess === randomNumber) { message.textContent = "🎉 You guessed it!"; }
    else {
        lives--;
        livesDisplay.textContent = `❤️ Lives: ${lives}`;
        message.textContent = guess < randomNumber ? "⬆️ Too low!" : "⬇️ Too high!";
        if (lives === 0) message.textContent = `💀 Game over! Number was ${randomNumber}`;
    }
    guessInput.value = "";
};

restartGuess.onclick = () => {
    randomNumber = Math.floor(Math.random() * 100) + 1;
    lives = 10;
    message.textContent = "";
    livesDisplay.textContent = `❤️ Lives: ${lives}`;
    guessInput.value = "";
};

// --- Clicker Game ---
let score = 0;
const clickButton = document.getElementById("clickButton");
const scoreDisplay = document.getElementById("score");
const restartClicker = document.getElementById("restartClicker");

clickButton.onclick = () => { score++; scoreDisplay.textContent = score; };
restartClicker.onclick = () => { score = 0; scoreDisplay.textContent = score; };

// --- Snake Game ---
const canvas = document.getElementById("snakeCanvas");
const ctx = canvas.getContext("2d");

const snakeScoreDisplay = document.getElementById("snakeScore");
const startSnakeBtn = document.getElementById("startSnake");

// On-screen buttons
const upBtn = document.getElementById("upBtn");
const downBtn = document.getElementById("downBtn");
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

let snake = [];
let direction = "RIGHT";
let food = {};
let snakeScore = 0;
let snakeInterval;
const gridSize = 20;
const canvasSize = 400;

startSnakeBtn.onclick = startSnake;

// Keyboard controls
document.addEventListener("keydown", e => {
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
    if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

// Button controls
if(upBtn) upBtn.onclick = () => { if(direction !== "DOWN") direction = "UP"; };
if(downBtn) downBtn.onclick = () => { if(direction !== "UP") direction = "DOWN"; };
if(leftBtn) leftBtn.onclick = () => { if(direction !== "RIGHT") direction = "LEFT"; };
if(rightBtn) rightBtn.onclick = () => { if(direction !== "LEFT") direction = "RIGHT"; };

function startSnake() {
    snake = [{x:10, y:10}];
    direction = "RIGHT";
    snakeScore = 0;
    if(snakeScoreDisplay) snakeScoreDisplay.textContent = snakeScore;
    placeFood();
    clearInterval(snakeInterval);
    snakeInterval = setInterval(updateSnake, 150);
    drawSnake();

    canvas.setAttribute("tabindex","0");
    canvas.focus();
}

function placeFood() {
    food = {
        x: Math.floor(Math.random() * (canvasSize / gridSize)),
        y: Math.floor(Math.random() * (canvasSize / gridSize))
    };
}

function updateSnake() {
    let head = {x: snake[0].x, y: snake[0].y};
    if(direction==="UP") head.y--;
    if(direction==="DOWN") head.y++;
    if(direction==="LEFT") head.x--;
    if(direction==="RIGHT") head.x++;

    if(head.x<0 || head.x>=canvasSize/gridSize || head.y<0 || head.y>=canvasSize/gridSize ||
        snake.some(seg=>seg.x===head.x && seg.y===head.y)) {
        clearInterval(snakeInterval);
        alert("💀 Game Over!");
        return;
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        snakeScore++;
        if(snakeScoreDisplay) snakeScoreDisplay.textContent = snakeScore;
        placeFood();
    } else snake.pop();

    drawSnake();
}

function drawSnake() {
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#0f0";
    snake.forEach(seg => ctx.fillRect(seg.x*gridSize, seg.y*gridSize, gridSize, gridSize));

    ctx.fillStyle="#ff0055";
    ctx.fillRect(food.x*gridSize, food.y*gridSize, gridSize, gridSize);
}
</script>
</body>
</html>
