<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Guess Game 🎮</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
    <h1>🎯 GUESS THE NUMBER</h1>
    <p class="subtitle">Pick a number from 1 to 100</p>

    <input type="number" id="guessInput" placeholder="Enter number">
    
    <button class="guess-btn" onclick="submitGuess()">GUESS</button>

    <p id="message"></p>
    <p id="lives">❤️ Lives: 10</p>

    <button class="restart" onclick="restart()">RESTART</button>
</div>

<script src="script.js"></script>
</body>
</html>
