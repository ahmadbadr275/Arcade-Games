<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Arcade Hub 🎮</title>

<style>
body {
  background:#0a0a0a;
  color:#fff;
  font-family:monospace;
  text-align:center;
}

h1,h2 {
  color:#ff0055;
  text-shadow:0 0 15px #ff0055;
}

button {
  background:#111;
  border:2px solid #ff0055;
  color:#fff;
  padding:12px;
  margin:10px;
  cursor:pointer;
  font-size:14px;
}

button:hover {
  background:#ff0055;
  color:#000;
}

.menu,.game { display:none; }
.active { display:block; }

canvas {
  border:2px solid #ff0055;
  margin:20px auto;
  display:block;
}
</style>
</head>

<body>

<h1>🎮 ULTIMATE ARCADE HUB</h1>

<div id="menu" class="menu active">
  <button onclick="openGame('guess')">🎯 Guess</button>
  <button onclick="openGame('clicker')">🖱️ Clicker</button>
  <button onclick="openGame('snake')">🐍 Snake</button>
  <button onclick="openGame('f1')">🏎️ F1</button>
  <button onclick="openGame('brick')">🧱 Brick</button>
</div>

<!-- GUESS -->
<div id="guess" class="game">
  <h2>Guess</h2>
  <input id="guessInput" type="number">
  <button onclick="guess()">Guess</button>
  <p id="msg"></p>
  <button onclick="back()">Back</button>
</div>

<!-- CLICKER -->
<div id="clicker" class="game">
  <h2>Clicker</h2>
  <button onclick="clickScore()">CLICK</button>
  <p id="score">0</p>
  <button onclick="back()">Back</button>
</div>

<!-- SNAKE -->
<div id="snake" class="game">
  <h2>Snake</h2>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>
  <button onclick="startSnake()">Start</button>
  <button onclick="back()">Back</button>
</div>

<!-- F1 -->
<div id="f1" class="game">
  <h2>F1</h2>
  <canvas id="f1Canvas" width="400" height="500"></canvas>
  <button onclick="startF1()">Start</button>
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="back()">Back</button>
</div>

<!-- BRICK -->
<div id="brick" class="game">
  <h2>Brick</h2>
  <canvas id="brickCanvas" width="400" height="400"></canvas>
  <button onclick="startBrick()">Start</button>
  <button onclick="back()">Back</button>
</div>

<script>

// SOUND
function beep(freq=300){
  let ctx = new (window.AudioContext||window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

// MENU
function openGame(id){
  document.querySelectorAll('.menu,.game').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function back(){
  openGame('menu');
}

// GUESS
let number = Math.floor(Math.random()*100)+1;
function guess(){
  let g = document.getElementById("guessInput").value;
  let msg = document.getElementById("msg");

  if(g == number){ msg.textContent="🎉 Correct!"; beep(600); }
  else if(g < number){ msg.textContent="Too low"; beep(200); }
  else { msg.textContent="Too high"; beep(200); }
}

// CLICKER
let score=0;
function clickScore(){
  score++;
  document.getElementById("score").textContent=score;
  beep(500);
}

// SNAKE
let sctx = document.getElementById("snakeCanvas").getContext("2d");
let snake, food, dir, snakeInt;

function startSnake(){
  snake=[{x:10,y:10}];
  dir="RIGHT";
  food={x:5,y:5};
  clearInterval(snakeInt);
  snakeInt=setInterval(updateSnake,100);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"&&dir!=="DOWN")dir="UP";
  if(e.key==="ArrowDown"&&dir!=="UP")dir="DOWN";
  if(e.key==="ArrowLeft"&&dir!=="RIGHT")dir="LEFT";
  if(e.key==="ArrowRight"&&dir!=="LEFT")dir="RIGHT";
});

function updateSnake(){
  let head={...snake[0]};
  if(dir==="UP")head.y--;
  if(dir==="DOWN")head.y++;
  if(dir==="LEFT")head.x--;
  if(dir==="RIGHT")head.x++;

  if(head.x<0||head.y<0||head.x>=20||head.y>=20||
     snake.some(s=>s.x===head.x&&s.y===head.y)){
    clearInterval(snakeInt);
    beep(100);
    alert("Game Over");
    return;
  }

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
    beep(700);
  } else snake.pop();

  drawSnake();
}

function drawSnake(){
  sctx.fillStyle="#000";
  sctx.fillRect(0,0,400,400);

  sctx.fillStyle="lime";
  snake.forEach(s=>sctx.fillRect(s.x*20,s.y*20,20,20));

  sctx.fillStyle="#ff0055";
  sctx.fillRect(food.x*20,food.y*20,20,20);
}

// F1
let fctx = document.getElementById("f1Canvas").getContext("2d");
let car={x:180,y:450}, obs=[], f1Int;

function startF1(){
  car.x=180; obs=[];
  clearInterval(f1Int);
  f1Int=setInterval(updateF1,30);
}

function moveLeft(){ car.x-=20; }
function moveRight(){ car.x+=20; }

function updateF1(){
  fctx.fillStyle="#000";
  fctx.fillRect(0,0,400,500);

  fctx.fillStyle="lime";
  fctx.fillRect(car.x,car.y,40,50);

  if(Math.random()<0.03){
    obs.push({x:Math.random()*360,y:0});
  }

  obs.forEach(o=>{
    o.y+=5;
    fctx.fillStyle="#ff0055";
    fctx.fillRect(o.x,o.y,40,50);

    if(car.x<o.x+40 && car.x+40>o.x && car.y<o.y+50 && car.y+50>o.y){
      clearInterval(f1Int);
      beep(100);
      alert("Crash!");
    }
  });
}

// BRICK
let bctx = document.getElementById("brickCanvas").getContext("2d");
let ball, paddle, bricks, bInt;

function startBrick(){
  paddle={x:150};
  ball={x:200,y:200,dx:3,dy:-3};
  bricks=[];

  for(let i=0;i<5;i++){
    for(let j=0;j<3;j++){
      bricks.push({x:i*80+20,y:j*30+30,hit:false});
    }
  }

  clearInterval(bInt);
  bInt=setInterval(updateBrick,20);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") paddle.x-=20;
  if(e.key==="ArrowRight") paddle.x+=20;
});

function updateBrick(){
  bctx.fillStyle="#000";
  bctx.fillRect(0,0,400,400);

  bctx.fillStyle="lime";
  bctx.fillRect(paddle.x,370,80,10);

  bctx.beginPath();
  bctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  bctx.fill();
  ball.x+=ball.dx;
  ball.y+=ball.dy;

  if(ball.x<0||ball.x>400) ball.dx*=-1;
  if(ball.y<0) ball.dy*=-1;

  if(ball.y>370 && ball.x>paddle.x && ball.x<paddle.x+80){
    ball.dy*=-1;
    beep(400);
  }

  if(ball.y>400){
    clearInterval(bInt);
    beep(100);
    alert("Game Over");
  }

  bricks.forEach(b=>{
    if(!b.hit){
      bctx.fillStyle="#ff0055";
      bctx.fillRect(b.x,b.y,60,20);

      if(ball.x>b.x && ball.x<b.x+60 && ball.y>b.y && ball.y<b.y+20){
        b.hit=true;
        ball.dy*=-1;
        beep(700);
      }
    }
  });
}

</script>

</body>
</html>
