<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Arcade Hub 🎮</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:monospace;
  text-align:center;
  margin:0;
}

h1,h2 {
  color:#ff0055;
  text-shadow:0 0 10px #ff0055;
}

button {
  background:#222;
  border:2px solid #ff0055;
  color:#fff;
  padding:12px 20px;
  margin:10px;
  cursor:pointer;
}

button:hover {
  background:#ff0055;
  color:#111;
}

.menu,.game { display:none; }
.active { display:block; }

canvas {
  border:2px solid #ff0055;
  display:block;
  margin:20px auto;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>🎮 ULTIMATE ARCADE HUB</h1>

<div id="menu" class="menu active">
  <button onclick="openGame('guess')">🎯 Guess</button>
  <button onclick="openGame('clicker')">🖱️ Clicker</button>
  <button onclick="openGame('snake')">🐍 Snake</button>
  <button onclick="openGame('f1')">🏎️ F1</button>
  <button onclick="openGame('brick')">🧱 Brick</button>
</div>

<div id="guess" class="game">
  <h2>Guess Game</h2>
  <input id="guessInput" type="number">
  <button onclick="checkGuess()">Guess</button>
  <p id="guessMsg"></p>
  <button onclick="openGame('menu')">Back</button>
</div>

<div id="clicker" class="game">
  <h2>Clicker</h2>
  <button onclick="clickScore()">CLICK</button>
  <p id="clickScore">0</p>
  <button onclick="openGame('menu')">Back</button>
</div>

<div id="snake" class="game">
  <h2>Snake</h2>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>
  <button onclick="startSnake()">Start</button>
  <button onclick="openGame('menu')">Back</button>
</div>

<div id="f1" class="game">
  <h2>F1 Racing</h2>
  <canvas id="f1Canvas" width="400" height="500"></canvas>
  <button onclick="startF1()">Start</button>
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="openGame('menu')">Back</button>
</div>

<div id="brick" class="game">
  <h2>Brick Breaker</h2>
  <canvas id="brickCanvas" width="400" height="400"></canvas>
  <button onclick="startBrick()">Start</button>
  <button onclick="openGame('menu')">Back</button>
</div>

<script>

// MENU
function openGame(id){
  document.querySelectorAll('.menu,.game').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// GUESS
let random = Math.floor(Math.random()*100)+1;
function checkGuess(){
  let val = Number(document.getElementById("guessInput").value);
  let msg = document.getElementById("guessMsg");

  if(!val) return msg.textContent="Enter number";
  if(val === random) msg.textContent="🎉 Correct!";
  else if(val < random) msg.textContent="Too low";
  else msg.textContent="Too high";
}

// CLICKER
let clicks = 0;
function clickScore(){
  clicks++;
  document.getElementById("clickScore").textContent = clicks;
}

// SNAKE
let sctx = document.getElementById("snakeCanvas").getContext("2d");
function startSnake(){
  sctx.fillStyle="#111";
  sctx.fillRect(0,0,400,400);
  sctx.fillStyle="lime";
  sctx.fillRect(180,180,20,20);
}

// F1
let fctx = document.getElementById("f1Canvas").getContext("2d");
let carX = 180;

function startF1(){
  drawCar();
}

function drawCar(){
  fctx.clearRect(0,0,400,500);
  fctx.fillStyle="lime";
  fctx.fillRect(carX,450,40,40);
}

function moveLeft(){
  carX -= 10;
  if(carX < 0) carX = 0;
  drawCar();
}

function moveRight(){
  carX += 10;
  if(carX > 360) carX = 360;
  drawCar();
}

// BRICK
let bctx = document.getElementById("brickCanvas").getContext("2d");
let ballX = 200, ballY = 200, dx = 3, dy = -3;
let brickInterval;

function startBrick(){
  clearInterval(brickInterval);
  ballX = 200;
  ballY = 200;
  dx = 3;
  dy = -3;
  brickInterval = setInterval(updateBrick,20);
}

function updateBrick(){
  bctx.clearRect(0,0,400,400);

  bctx.beginPath();
  bctx.arc(ballX,ballY,8,0,Math.PI*2);
  bctx.fillStyle="#ff0055";
  bctx.fill();
  bctx.closePath();

  ballX += dx;
  ballY += dy;

  if(ballX > 392 || ballX < 8) dx *= -1;
  if(ballY < 8) dy *= -1;

  if(ballY > 400){
    clearInterval(brickInterval);
    alert("💀 Game Over");
  }
}

</script>

</body>
</html>
