<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Arcade Hub 🎮</title>
<style>
body { background:#111; color:#fff; font-family:'Press Start 2P',monospace; text-align:center; margin:0; padding:0;}
h1,h2{margin:20px 0;color:#ff0055;text-shadow:0 0 5px #ff0055,0 0 10px #ff0055;}
button {background:#222;border:2px solid #ff0055;color:#fff;padding:12px 25px;margin:10px;font-family:'Press Start 2P',monospace;font-size:12px;cursor:pointer;transition:0.2s;text-shadow:0 0 2px #ff0055;}
button:hover{background:#ff0055;color:#111;box-shadow:0 0 10px #ff0055;}
.menu,.game{display:none;margin-top:20px;}
.active{display:block;}
input[type=number],select{padding:8px;font-size:14px;width:100px;text-align:center;border:2px solid #ff0055;background:#111;color:#fff;text-shadow:0 0 2px #ff0055;}
#message{margin-top:15px;font-size:14px;text-shadow:0 0 2px #ff0055;}
canvas{background:#111;border:2px solid #ff0055;display:block;margin:20px auto;}
#snakeControls,#f1Controls,#brickControls{margin-top:10px;display:grid;grid-template-columns:80px 80px 80px;justify-content:center;gap:5px;}
#snakeControls button,#f1Controls button,#brickControls button{width:80px;height:80px;font-size:28px;background:#222;border:3px solid #ff0055;color:#fff;cursor:pointer;border-radius:8px;transition:0.2s;}
#snakeControls button:hover,#f1Controls button:hover,#brickControls button:hover{background:#ff0055;color:#111;box-shadow:0 0 15px #ff0055;}
</style>
</head>
<body>
<h1>🎮 ULTIMATE ARCADE HUB</h1>

<!-- Menu -->
<div class="menu active" id="menu">
    <p>Select a game:</p>
    <button id="openGuess">🎯 Guess the Number</button>
    <button id="openClicker">🖱️ Clicker Game</button>
    <button id="openSnake">🐍 Snake Game</button>
    <button id="openF1">🏎️ F1 Racing</button>
    <button id="openBrick">🧱 Brick Breaker</button>
</div>

<!-- Guess Game -->
<div class="game" id="guess">
    <h2>🎯 GUESS THE NUMBER</h2>
    <p>Select difficulty:</p>
    <select id="difficulty">
        <option value="50">Easy (1-50)</option>
        <option value="100" selected>Medium (1-100)</option>
        <option value="200">Hard (1-200)</option>
    </select><br>
    <input type="number" id="guessInput" placeholder="Enter number">
    <button id="guessBtn">GUESS</button>
    <p id="message"></p>
    <p id="lives">❤️ Lives: 10</p>
    <p>High Score: <span id="guessHighScore">0</span></p>
    <button id="restartGuess">RESTART</button>
    <button class="back">🏠 Menu</button>
</div>

<!-- Clicker Game -->
<div class="game" id="clicker">
    <h2>🖱️ CLICKER GAME</h2>
    <button id="clickButton">CLICK ME!</button>
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="clickerHigh">0</span></p>
    <button id="restartClicker">RESTART</button>
    <button class="back">🏠 Menu</button>
</div>

<!-- Snake Game -->
<div class="game" id="snake">
    <h2>🐍 SNAKE GAME</h2>
    <p>Select speed:</p>
    <select id="snakeSpeed">
        <option value="200">Slow</option>
        <option value="150" selected>Normal</option>
        <option value="100">Fast</option>
    </select>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <p>Score: <span id="snakeScore">0</span></p>
    <button id="startSnake">START</button>
    <div id="snakeControls">
        <div></div><button id="upBtn">⬆️</button><div></div>
        <button id="leftBtn">⬅️</button><button id="downBtn">⬇️</button><button id="rightBtn">➡️</button>
    </div>
    <button class="back">🏠 Menu</button>
</div>

<!-- F1 Racing -->
<div class="game" id="f1">
    <h2>🏎️ F1 RACING</h2>
    <canvas id="f1Canvas" width="400" height="600"></canvas>
    <p>Distance: <span id="f1Score">0</span></p>
    <button id="startF1">START</button>
    <div id="f1Controls">
        <button id="leftF1">⬅️</button>
        <button id="rightF1">➡️</button>
    </div>
    <button class="back">🏠 Menu</button>
</div>

<!-- Brick Breaker -->
<div class="game" id="brick">
    <h2>🧱 BRICK BREAKER</h2>
    <canvas id="brickCanvas" width="400" height="400"></canvas>
    <p>Score: <span id="brickScore">0</span></p>
    <button id="startBrick">START</button>
    <div id="brickControls">
        <button id="leftBrick">⬅️</button>
        <button id="rightBrick">➡️</button>
    </div>
    <button class="back">🏠 Menu</button>
</div>

<script>
// --- Menu ---
const games=["menu","guess","clicker","snake","f1","brick"];
function openGame(id){games.forEach(g=>document.getElementById(g).classList.remove("active"));document.getElementById(id).classList.add("active");}
document.getElementById('openGuess').onclick=()=>openGame('guess');
document.getElementById('openClicker').onclick=()=>openGame('clicker');
document.getElementById('openSnake').onclick=()=>openGame('snake');
document.getElementById('openF1').onclick=()=>openGame('f1');
document.getElementById('openBrick').onclick=()=>openGame('brick');
document.querySelectorAll('.back').forEach(btn=>btn.onclick=()=>{
    clearInterval(snakeInterval); clearInterval(f1Interval); clearInterval(brickInterval);
    openGame('menu');
});

// --- Guess Game ---
let randomNumber=0,lives=10;
const guessInput=document.getElementById("guessInput");
const guessBtn=document.getElementById("guessBtn");
const message=document.getElementById("message");
const livesDisplay=document.getElementById("lives");
const restartGuess=document.getElementById("restartGuess");
const difficulty=document.getElementById("difficulty");
const guessHighScore=document.getElementById("guessHighScore");

function initGuess(){
    const max=parseInt(difficulty.value);
    randomNumber=Math.floor(Math.random()*max)+1;
    lives=10;
    message.textContent="";
    livesDisplay.textContent=`❤️ Lives: ${lives}`;
    guessInput.value="";
}
difficulty.onchange=initGuess;
restartGuess.onclick=initGuess;
initGuess();

guessBtn.onclick=()=>{
    const guess=Number(guessInput.value);
    if(!guess){message.textContent="❌ Enter a number!"; return;}
    if(guess===randomNumber){message.textContent="🎉 You guessed it!"; updateGuessHighScore(lives);}
    else{lives--; livesDisplay.textContent=`❤️ Lives: ${lives}`; message.textContent=guess<randomNumber?"⬆️ Too low!":"⬇️ Too high!"; if(lives===0) message.textContent=`💀 Game over! Number was ${randomNumber}`;}
    guessInput.value="";
};
function updateGuessHighScore(score){const high=localStorage.getItem("guessHigh")||0;if(score>high)localStorage.setItem("guessHigh",score);guessHighScore.textContent=localStorage.getItem("guessHigh");}
updateGuessHighScore(0);

// --- Clicker Game ---
let score=0;
const clickButton=document.getElementById("clickButton");
const scoreDisplay=document.getElementById("score");
const restartClicker=document.getElementById("restartClicker");
const clickerHigh=document.getElementById("clickerHigh");
function updateClickHigh(){const high=localStorage.getItem("clickHigh")||0;if(score>high)localStorage.setItem("clickHigh",score);clickerHigh.textContent=localStorage.getItem("clickHigh");}
clickButton.onclick=()=>{score++; scoreDisplay.textContent=score; updateClickHigh();}
restartClicker.onclick=()=>{score=0; scoreDisplay.textContent=score; updateClickHigh();}
updateClickHigh();

// --- Snake Game ---
const snakeCanvas=document.getElementById("snakeCanvas"); const sCtx=snakeCanvas.getContext("2d");
const snakeScoreDisplay=document.getElementById("snakeScore"); const startSnakeBtn=document.getElementById("startSnake");
const snakeSpeedSelect=document.getElementById("snakeSpeed");
const upBtn=document.getElementById("upBtn"); const downBtn=document.getElementById("downBtn"); const leftBtn=document.getElementById("leftBtn"); const rightBtn=document.getElementById("rightBtn");
let snake=[],direction="RIGHT",food={},snakeScore=0,snakeInterval,gridSize=20,canvasSize=400;
startSnakeBtn.onclick=startSnake;
document.addEventListener("keydown",e=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault(); if(e.key==="ArrowUp" && direction!=="DOWN") direction="UP"; if(e.key==="ArrowDown" && direction!=="UP") direction="DOWN"; if(e.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT"; if(e.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT";});
upBtn.onclick=()=>{if(direction!=="DOWN") direction="UP";}; downBtn.onclick=()=>{if(direction!=="UP") direction="DOWN";}; leftBtn.onclick=()=>{if(direction!=="RIGHT") direction="LEFT";}; rightBtn.onclick=()=>{if(direction!=="LEFT") direction="RIGHT";};
function startSnake(){snake=[{x:10,y:10}]; direction="RIGHT"; snakeScore=0; snakeScoreDisplay.textContent=snakeScore; placeFood(); clearInterval(snakeInterval); const speed=parseInt(snakeSpeedSelect.value); snakeInterval=setInterval(updateSnake,speed); drawSnake(); snakeCanvas.setAttribute("tabindex","0"); snakeCanvas.focus();}
function placeFood(){food={x:Math.floor(Math.random()*(canvasSize/gridSize)),y:Math.floor(Math.random()*(canvasSize/gridSize))};}
function updateSnake(){let head={x:snake[0].x,y:snake[0].y};if(direction==="UP") head.y--; if(direction==="DOWN") head.y++; if(direction==="LEFT") head.x--; if(direction==="RIGHT") head.x++; if(head.x<0 || head.x>=canvasSize/gridSize || head.y<0 || head.y>=canvasSize/gridSize || snake.some(seg=>seg.x===head.x && seg.y===head.y)){clearInterval(snakeInterval); alert("💀 Game Over!"); return;} snake.unshift(head); if(head.x===food.x && head.y===food.y){snakeScore++; snakeScoreDisplay.textContent=snakeScore; placeFood(); clearInterval(snakeInterval); const speed=parseInt(snakeSpeedSelect.value)-Math.floor(snakeScore/5)*10; snakeInterval=setInterval(updateSnake,speed>30?speed:30);} else snake.pop(); drawSnake();}
function drawSnake(){sCtx.fillStyle="#111"; sCtx.fillRect(0,0,snakeCanvas.width,snakeCanvas.height); sCtx.fillStyle="#0f0"; snake.forEach(seg=>sCtx.fillRect(seg.x*gridSize,seg.y*gridSize,gridSize,gridSize)); sCtx.fillStyle="#ff0055"; sCtx.fillRect(food.x*gridSize,food.y*gridSize,gridSize,gridSize);}

// --- F1 Racing Game ---
const f1Canvas=document.getElementById("f1Canvas"); const f1Ctx=f1Canvas.getContext("2d");
const f1ScoreDisplay=document.getElementById("f1Score"); const startF1Btn=document.getElementById("startF1");
const leftF1=document.getElementById("leftF1"); const rightF1=document.getElementById("rightF1");
let f1Car={x:180,y:500,width:40,height:60}; let obstacles=[]; let f1Score=0; let f1Interval; let moveLeft=false, moveRight=false;
startF1Btn.onclick=startF1;
document.addEventListener("keydown", e=>{if(e.key==="ArrowLeft") moveLeft=true; if(e.key==="ArrowRight") moveRight=true;});
document.addEventListener("keyup", e=>{if(e.key==="ArrowLeft") moveLeft=false; if(e.key==="ArrowRight") moveRight=false;});
leftF1.onmousedown=()=>moveLeft=true; leftF1.onmouseup=()=>moveLeft=false; rightF1.onmousedown=()=>moveRight=true; rightF1.onmouseup=()=>moveRight=false;
function startF1(){f1Car={x:180,y:500,width:40,height:60}; obstacles=[]; f1Score=0; f1ScoreDisplay.textContent=f1Score; clearInterval(f1Interval); f1Interval=setInterval(updateF1,30);}
function updateF1(){f1Ctx.fillStyle="#111"; f1Ctx.fillRect(0,0,f1Canvas.width,f1Canvas.height); if(moveLeft) f1Car.x-=5; if(moveRight) f1Car.x+=5; if(f1Car.x<0) f1Car.x=0; if(f1Car.x+f1Car.width>f1Canvas.width) f1Car.x=f1Canvas.width-f1Car.width; f1Ctx.fillStyle="#0f0"; f1Ctx.fillRect(f1Car.x,f1Car.y,f1Car.width,f1Car.height); if(Math.random()<0.02){obstacles.push({x:Math.random()*(f1Canvas.width-40), y:-60, width:40, height:60});} for(let i=obstacles.length-1;i>=0;i--){let ob=obstacles[i]; ob.y+=5; f1Ctx.fillStyle="#ff0055"; f1Ctx.fillRect(ob.x,ob.y,ob.width,ob.height); if(f1Car.x<ob.x+ob.width && f1Car.x+f1Car.width>ob.x && f1Car.y<ob.y+ob.height && f1Car.y+f1Car.height>ob.y){clearInterval(f1Interval); alert("💥 Crash! Distance: "+f1Score); return;} if(ob.y>f1Canvas.height) obstacles.splice(i,1);} f1Score++; f1ScoreDisplay.textContent=f1Score;}

// --- Brick Breaker ---
const brickCanvas=document.getElementById("brickCanvas"); const brickCtx=brickCanvas.getContext("2d");
const brickScoreDisplay=document.getElementById("brickScore"); const startBrickBtn=document.getElementById("startBrick");
const leftBrick=document.getElementById("leftBrick"); const rightBrick=document.getElementById("rightBrick");
let paddle={x:160,y:360,width:80,height:10},ball={x:200,y:350,dx:3,dy:-3,r:8},bricks=[],brickRows=3,brickCols=5,brickWidth=70,brickHeight=20,brickPadding=10,brickOffsetTop=30,brickOffsetLeft=20,brickScore=0;
let brickInterval;
startBrickBtn.onclick=startBrick;
document.addEventListener("keydown", e=>{if(e.key==="ArrowLeft") paddle.x-=20; if(e.key==="ArrowRight") paddle.x+=20;});
leftBrick.onmousedown=()=>paddle.x-=10; rightBrick.onmousedown=()=>paddle.x+=10;
function startBrick(){bricks=[]; for(let c=0;c<brickCols;c++){bricks[c]=[]; for(let r=0;r<brickRows;r++){bricks[c][r]={x:0,y:0,status:1};}} paddle.x=160; ball.x=200; ball.y=350; brickScore=0; brickScoreDisplay.textContent=brickScore; clearInterval(brickInterval); brickInterval=setInterval(updateBrick,20);}
function updateBrick(){brickCtx.fillStyle="#111"; brickCtx.fillRect(0,0,brickCanvas.width,brickCanvas.height);
for(let c=0;c<brickCols;c++){for(let r=0;r<brickRows;r++){if(bricks[c][r].status==1){let brickX=c*(brickWidth+brickPadding)+brickOffsetLeft; let brickY=r*(brickHeight+brickPadding)+brickOffsetTop; bricks[c][r].x=brickX; bricks[c][r].y=brickY; brickCtx.fillStyle="#ff0055"; brickCtx.fillRect(brickX,brickY,brickWidth,brickHeight);}}}
ball.x+=ball.dx; ball
